<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Portal - Vehicle Service System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        header {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
        }

        .nav-btn {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .nav-btn:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 25px;
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: #667eea;
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .form-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        .submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .service-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
            border-left: 5px solid #667eea;
        }

        .service-card h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .service-detail {
            color: #666;
            font-size: 14px;
            margin: 5px 0;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 10px;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .status-assigned {
            background: #cfe2ff;
            color: #084298;
        }

        .status-completed {
            background: #d1e7dd;
            color: #0f5132;
        }

        .search-box {
            margin-bottom: 20px;
        }

        .search-box input {
            background: white;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #999;
            background: white;
            border-radius: 12px;
        }

        .success-message {
            background: #d1e7dd;
            color: #0f5132;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .error-message {
            background: #f8d7da;
            color: #842029;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
        }

        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <header>
        <h1>🚗 Customer Portal</h1>
        <div class="nav-buttons">
            <button class="nav-btn" onclick="window.location='login.html'">🚪 Back to Login</button>
        </div>
    </header>

    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('book')">📋 Book Service</button>
            <button class="tab-btn" onclick="switchTab('status')">📊 My Services</button>
            <button class="tab-btn" onclick="switchTab('history')">📜 Service History</button>
        </div>

        <!-- BOOK SERVICE TAB -->
        <div id="book" class="tab-content active">
            <div class="form-section">
                <h2>🔧 Book a New Service</h2>
                <div class="error-message" id="bookError"></div>
                <div class="success-message" id="bookSuccess">✓ Service booked successfully!</div>

                <form onsubmit="bookService(event)">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Full Name *</label>
                            <input type="text" id="customerName" required>
                        </div>
                        <div class="form-group">
                            <label>Email *</label>
                            <input type="email" id="customerEmail" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Phone Number *</label>
                            <input type="tel" id="customerPhone" required>
                        </div>
                        <div class="form-group">
                            <label>Vehicle Number (Registration) *</label>
                            <input type="text" id="vehicle" placeholder="e.g., KA01AB1234" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Vehicle Model *</label>
                            <input type="text" id="vehicleModel" placeholder="e.g., Hyundai Creta" required>
                        </div>
                        <div class="form-group">
                            <label>Vehicle Year *</label>
                            <input type="number" id="vehicleYear" min="2000" max="2030" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Current Mileage (km) *</label>
                            <input type="number" id="mileage" min="0" required>
                        </div>
                        <div class="form-group">
                            <label>Service Type *</label>
                            <select id="serviceType" required>
                                <option value="">Select Service Type</option>
                                <option value="Oil Change">Oil Change</option>
                                <option value="Tire Rotation">Tire Rotation</option>
                                <option value="Battery Check">Battery Check</option>
                                <option value="Brake Inspection">Brake Inspection</option>
                                <option value="Engine Checkup">Engine Checkup</option>
                                <option value="AC Service">AC Service</option>
                                <option value="General Maintenance">General Maintenance</option>
                                <option value="Repair">Repair</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>

                    <button type="submit" class="submit-btn">📝 Book Service</button>
                </form>
            </div>
        </div>

        <!-- STATUS TAB -->
        <div id="status" class="tab-content">
            <div class="form-section">
                <h2>📊 My Current Services</h2>
                <div class="search-box">
                    <input type="text" id="searchVehicle" placeholder="Filter by Vehicle Number (optional)" onkeyup="getStatus()">
                </div>
                <div id="statusList"></div>
            </div>
        </div>

        <!-- HISTORY TAB -->
        <div id="history" class="tab-content">
            <div class="form-section">
                <h2>📜 Service History</h2>
                <div class="stats-grid" id="statsContainer"></div>
                <div id="historyList"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "http://localhost:8080";

        // Auto-load status tab if returning from booking
        window.addEventListener('load', function() {
            const params = new URLSearchParams(window.location.search);
            const vehicleNumber = params.get('vehicleNumber');
            
            if (vehicleNumber) {
                // Switch to status tab
                document.getElementById('status').classList.add('active');
                document.querySelector('[onclick="switchTab(\'status\')"]').classList.add('active');
                document.getElementById('book').classList.remove('active');
                document.querySelector('[onclick="switchTab(\'book\')"]').classList.remove('active');
                document.getElementById('history').classList.remove('active');
                document.querySelector('[onclick="switchTab(\'history\')"]').classList.remove('active');
                
                // Pre-fill and search for vehicle
                document.getElementById('searchVehicle').value = vehicleNumber;
                getStatus();
            }
        });

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');

            if (tabName === 'status') {
                getStatus();
            } else if (tabName === 'history') {
                loadHistory();
            }
        }

        async function bookService(e) {
            e.preventDefault();
            
            const params = new URLSearchParams({
                vehicle: document.getElementById('vehicle').value,
                type: document.getElementById('serviceType').value,
                customerName: document.getElementById('customerName').value,
                customerEmail: document.getElementById('customerEmail').value,
                customerPhone: document.getElementById('customerPhone').value,
                vehicleModel: document.getElementById('vehicleModel').value,
                vehicleYear: parseInt(document.getElementById('vehicleYear').value),
                mileage: parseInt(document.getElementById('mileage').value)
            });

            try {
                const response = await fetch(`${API_URL}/book?${params}`, {
                    method: 'POST'
                });
                
                if (response.ok) {
                    const data = await response.json();
                    
                    // Redirect to success page with booking details
                    const vehicleNum = document.getElementById('vehicle').value;
                    const serviceType = document.getElementById('serviceType').value;
                    window.location.href = `booking-success.html?id=${data.id}&vehicle=${vehicleNum}&type=${serviceType}&status=${data.status}`;
                } else {
                    const errorData = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorData || 'Failed to book service'}`);
                }
            } catch (error) {
                console.error('Booking error:', error);
                document.getElementById('bookError').textContent = '❌ Error: ' + error.message;
                document.getElementById('bookError').style.display = 'block';
            }
        }

        async function getStatus() {
            const searchVehicle = document.getElementById('searchVehicle').value.toUpperCase();
            
            try {
                const response = await fetch(`${API_URL}/services`);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const allServices = await response.json();

                // Filter only PENDING and ASSIGNED services (current services)
                let currentServices = allServices.filter(s => s.status === 'PENDING' || s.status === 'ASSIGNED');
                
                // Apply vehicle search filter if provided
                if (searchVehicle) {
                    currentServices = currentServices.filter(s => s.vehicle.toUpperCase().includes(searchVehicle));
                }

                if (currentServices.length === 0) {
                    document.getElementById('statusList').innerHTML = '<div class="no-data">✅ No pending services. All done!</div>';
                    return;
                }

                let html = '';
                currentServices.forEach(service => {
                    const statusClass = `status-${service.status.toLowerCase()}`;
                    html += `
                        <div class="service-card">
                            <h3>Service ID: #${service.id}</h3>
                            <div class="service-detail"><b>Vehicle:</b> ${service.vehicle}</div>
                            <div class="service-detail"><b>Model:</b> ${service.vehicleModel} (${service.vehicleYear})</div>
                            <div class="service-detail"><b>Service Type:</b> ${service.type}</div>
                            <div class="service-detail"><b>Mileage:</b> ${service.mileage} km</div>
                            <div class="service-detail"><b>Customer:</b> ${service.customerName}</div>
                            <div class="service-detail"><b>Booked On:</b> ${new Date(service.createdDate).toLocaleDateString()}</div>
                            ${service.assignedTo ? `<div class="service-detail"><b>Assigned To:</b> ${service.assignedTo}</div>` : ''}
                            ${service.assignedDate ? `<div class="service-detail"><b>Assigned Date:</b> ${new Date(service.assignedDate).toLocaleDateString()}</div>` : ''}
                            ${service.notes ? `<div class="service-detail"><b>Notes:</b> ${service.notes}</div>` : ''}
                            <span class="status-badge ${statusClass}">🔄 ${service.status}</span>
                        </div>
                    `;
                });
                
                document.getElementById('statusList').innerHTML = html;
            } catch (error) {
                console.error('Status fetch error:', error);
                document.getElementById('statusList').innerHTML = '<div class="no-data">❌ Error loading services: ' + error.message + '</div>';
            }
        }

        async function loadHistory() {
            try {
                const response = await fetch(`${API_URL}/services`);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const allServices = await response.json();

                // Display statistics
                const completed = allServices.filter(s => s.status === 'COMPLETED').length;
                const assigned = allServices.filter(s => s.status === 'ASSIGNED').length;
                const pending = allServices.filter(s => s.status === 'PENDING').length;

                document.getElementById('statsContainer').innerHTML = `
                    <div class="stat-card">
                        <div class="stat-number">${allServices.length}</div>
                        <div class="stat-label">Total Services</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${completed}</div>
                        <div class="stat-label">Completed</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${assigned}</div>
                        <div class="stat-label">In Progress</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${pending}</div>
                        <div class="stat-label">Pending</div>
                    </div>
                `;

                // Display completed services
                const completedServices = allServices.filter(s => s.status === 'COMPLETED');
                
                if (completedServices.length === 0) {
                    document.getElementById('historyList').innerHTML = '<div class="no-data">No completed services yet</div>';
                    return;
                }

                let html = '';
                completedServices.forEach(service => {
                    html += `
                        <div class="service-card">
                            <h3>Service ID: #${service.id} - ${service.vehicleModel}</h3>
                            <div class="service-detail"><b>Vehicle:</b> ${service.vehicle}</div>
                            <div class="service-detail"><b>Service Type:</b> ${service.type}</div>
                            <div class="service-detail"><b>Customer:</b> ${service.customerName}</div>
                            <div class="service-detail"><b>Completed On:</b> ${new Date(service.completedDate).toLocaleDateString()}</div>
                            <div class="service-detail"><b>Cost:</b> ₹${service.cost || 'N/A'}</div>
                            ${service.notes ? `<div class="service-detail"><b>Notes:</b> ${service.notes}</div>` : ''}
                            <span class="status-badge status-completed">✓ COMPLETED</span>
                        </div>
                    `;
                });
                
                document.getElementById('historyList').innerHTML = html;
            } catch (error) {
                console.error('History fetch error:', error);
                document.getElementById('historyList').innerHTML = '<div class="no-data">❌ Error loading history: ' + error.message + '</div>';
            }
        }
    </script>
</body>
</html>
