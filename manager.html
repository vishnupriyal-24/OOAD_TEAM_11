<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Dashboard - Vehicle Service System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            padding: 20px;
        }

        header {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 28px;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
        }

        .nav-btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.3);
            color: white;
            border: 2px solid white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .nav-btn:hover {
            background: white;
            color: #f5576c;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
            border-left: 5px solid #f5576c;
        }

        .stat-number {
            font-size: 36px;
            font-weight: bold;
            color: #f5576c;
            margin-bottom: 10px;
        }

        .stat-label {
            color: #666;
            font-size: 14px;
        }

        .controls {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-input {
            flex: 1;
            min-width: 250px;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        .search-input:focus {
            outline: none;
            border-color: #f5576c;
            box-shadow: 0 0 0 3px rgba(245, 87, 108, 0.1);
        }

        .filter-btn, .refresh-btn {
            padding: 12px 25px;
            background: #f5576c;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .filter-btn:hover, .refresh-btn:hover {
            background: #f2394d;
            transform: translateY(-2px);
        }

        .filter-dropdown {
            padding: 10px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            font-weight: 600;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 25px;
            background: white;
            color: #f5576c;
            border: 2px solid #f5576c;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: #f5576c;
            color: white;
        }

        .service-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .service-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
            transition: all 0.3s;
            border-left: 5px solid #f5576c;
        }

        .service-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        .service-card h3 {
            color: #333;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .service-id {
            font-size: 14px;
            color: #999;
            background: #f5f5f5;
            padding: 5px 10px;
            border-radius: 5px;
        }

        .service-detail {
            color: #666;
            font-size: 14px;
            margin: 8px 0;
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }

        .service-detail:last-of-type {
            border-bottom: none;
        }

        .detail-label {
            font-weight: 600;
            color: #333;
            min-width: 120px;
        }

        .detail-value {
            color: #666;
            text-align: right;
            flex: 1;
        }

        .status-badge {
            display: inline-block;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin: 10px 0;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .status-assigned {
            background: #cfe2ff;
            color: #084298;
        }

        .status-completed {
            background: #d1e7dd;
            color: #0f5132;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-size: 13px;
        }

        .btn-assign {
            background: #667eea;
            color: white;
        }

        .btn-assign:hover {
            background: #5568d3;
        }

        .btn-complete {
            background: #28a745;
            color: white;
        }

        .btn-complete:hover {
            background: #218838;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s;
        }

        .close:hover {
            color: black;
        }

        .modal-form {
            margin-top: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            color: #333;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: #f5576c;
        }

        .no-data {
            text-align: center;
            padding: 60px 20px;
            color: #999;
            font-size: 16px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .service-container {
                grid-template-columns: 1fr;
            }

            .controls {
                flex-direction: column;
            }

            .search-input {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>👨‍💼 Manager Dashboard</h1>
        <div class="nav-buttons">
            <button class="nav-btn" onclick="window.location='login.html'">🚪 Logout</button>
        </div>
    </header>

    <div class="container">
        <!-- STATISTICS -->
        <div class="stats-grid" id="statsGrid"></div>

        <!-- CONTROLS -->
        <div class="controls">
            <input type="text" class="search-input" id="searchInput" placeholder="Search by Vehicle, Customer Name, or Service ID...">
            <select class="filter-dropdown" id="statusFilter" onchange="loadData()">
                <option value="">All Status</option>
                <option value="PENDING">Pending</option>
                <option value="ASSIGNED">Assigned</option>
                <option value="COMPLETED">Completed</option>
            </select>
            <button class="refresh-btn" onclick="loadData()">🔄 Refresh</button>
        </div>

        <!-- TABS -->
        <div class="tabs">
            <button class="tab-btn active" onclick="filterByStatus('')">📋 All Services</button>
            <button class="tab-btn" onclick="filterByStatus('PENDING')">⏳ Pending</button>
            <button class="tab-btn" onclick="filterByStatus('ASSIGNED')">🔧 In Progress</button>
            <button class="tab-btn" onclick="filterByStatus('COMPLETED')">✓ Completed</button>
        </div>

        <!-- SERVICE LIST -->
        <div class="service-container" id="serviceList"></div>
    </div>

    <!-- ASSIGN MODAL -->
    <div id="assignModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeAssignModal()">&times;</span>
            <h2>Assign Service</h2>
            <div class="modal-form">
                <div class="form-group">
                    <label>Assigned To (Mechanic Name) *</label>
                    <input type="text" id="assignedTo" placeholder="Enter mechanic/technician name">
                </div>
                <button class="btn btn-assign" onclick="submitAssign()" style="width: 100%;">Assign Service</button>
            </div>
        </div>
    </div>

    <!-- COMPLETE MODAL -->
    <div id="completeModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeCompleteModal()">&times;</span>
            <h2>Complete Service</h2>
            <div class="modal-form">
                <div class="form-group">
                    <label>Service Cost (₹) *</label>
                    <input type="number" id="cost" placeholder="Enter service cost" min="0" step="0.01">
                </div>
                <div class="form-group">
                    <label>Notes/Description</label>
                    <textarea id="notes" placeholder="Add any notes about the service..."></textarea>
                </div>
                <button class="btn btn-complete" onclick="submitComplete()" style="width: 100%;">✓ Mark as Completed</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "http://localhost:8080";
        let allServices = [];
        let currentServiceId = null;

        // Load data on page load
        window.addEventListener('load', loadData);

        async function loadData() {
            try {
                const response = await fetch(`${API_URL}/services`);
                allServices = await response.json();
                
                // Load statistics
                loadStats();
                
                // Load services
                displayServices(allServices);
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('serviceList').innerHTML = '<div class="no-data">Error loading services</div>';
            }
        }

        function loadStats() {
            const total = allServices.length;
            const pending = allServices.filter(s => s.status === 'PENDING').length;
            const assigned = allServices.filter(s => s.status === 'ASSIGNED').length;
            const completed = allServices.filter(s => s.status === 'COMPLETED').length;

            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card">
                    <div class="stat-number">${total}</div>
                    <div class="stat-label">Total Services</div>
                </div>
                <div class="stat-card" style="border-left-color: #ffc107;">
                    <div class="stat-number" style="color: #ffc107;">${pending}</div>
                    <div class="stat-label">Pending</div>
                </div>
                <div class="stat-card" style="border-left-color: #667eea;">
                    <div class="stat-number" style="color: #667eea;">${assigned}</div>
                    <div class="stat-label">In Progress</div>
                </div>
                <div class="stat-card" style="border-left-color: #28a745;">
                    <div class="stat-number" style="color: #28a745;">${completed}</div>
                    <div class="stat-label">Completed</div>
                </div>
            `;
        }

        function displayServices(services) {
            if (services.length === 0) {
                document.getElementById('serviceList').innerHTML = '<div class="no-data">No services found</div>';
                return;
            }

            let html = '';
            services.forEach(service => {
                const statusClass = `status-${service.status.toLowerCase()}`;
                const createdDate = new Date(service.createdDate).toLocaleDateString('en-IN');
                
                html += `
                    <div class="service-card">
                        <h3>
                            ${service.vehicleModel}
                            <span class="service-id">#${service.id}</span>
                        </h3>

                        <div class="service-detail">
                            <span class="detail-label">🚗 Vehicle:</span>
                            <span class="detail-value">${service.vehicle}</span>
                        </div>

                        <div class="service-detail">
                            <span class="detail-label">👤 Customer:</span>
                            <span class="detail-value">${service.customerName}</span>
                        </div>

                        <div class="service-detail">
                            <span class="detail-label">📱 Phone:</span>
                            <span class="detail-value">${service.customerPhone}</span>
                        </div>

                        <div class="service-detail">
                            <span class="detail-label">📧 Email:</span>
                            <span class="detail-value" style="font-size: 12px;">${service.customerEmail}</span>
                        </div>

                        <div class="service-detail">
                            <span class="detail-label">🔧 Service:</span>
                            <span class="detail-value">${service.type}</span>
                        </div>

                        <div class="service-detail">
                            <span class="detail-label">📊 Mileage:</span>
                            <span class="detail-value">${service.mileage} km</span>
                        </div>

                        <div class="service-detail">
                            <span class="detail-label">📅 Booked:</span>
                            <span class="detail-value">${createdDate}</span>
                        </div>

                        ${service.assignedTo ? `
                        <div class="service-detail">
                            <span class="detail-label">👨‍🔧 Assigned To:</span>
                            <span class="detail-value">${service.assignedTo}</span>
                        </div>
                        ` : ''}

                        ${service.cost ? `
                        <div class="service-detail">
                            <span class="detail-label">💰 Cost:</span>
                            <span class="detail-value">₹${service.cost}</span>
                        </div>
                        ` : ''}

                        ${service.notes ? `
                        <div class="service-detail">
                            <span class="detail-label">📝 Notes:</span>
                            <span class="detail-value">${service.notes}</span>
                        </div>
                        ` : ''}

                        <span class="status-badge ${statusClass}">${service.status}</span>

                        <div class="action-buttons">
                            ${service.status === 'PENDING' ? `<button class="btn btn-assign" onclick="openAssignModal(${service.id})">👨‍🔧 Assign</button>` : ''}
                            ${service.status !== 'COMPLETED' ? `<button class="btn btn-complete" onclick="openCompleteModal(${service.id})">✓ Complete</button>` : ''}
                            <button class="btn btn-secondary" onclick="viewDetails(${service.id})">👁️ Details</button>
                        </div>
                    </div>
                `;
            });

            document.getElementById('serviceList').innerHTML = html;
        }

        function filterByStatus(status) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            const filtered = status ? allServices.filter(s => s.status === status) : allServices;
            displayServices(filtered);
        }

        document.getElementById('searchInput').addEventListener('keyup', function() {
            const searchTerm = this.value.toLowerCase();
            const filtered = allServices.filter(s => 
                s.vehicle.toLowerCase().includes(searchTerm) ||
                s.customerName.toLowerCase().includes(searchTerm) ||
                s.id.toString().includes(searchTerm)
            );
            displayServices(filtered);
        });

        function openAssignModal(serviceId) {
            currentServiceId = serviceId;
            document.getElementById('assignedTo').value = '';
            document.getElementById('assignModal').style.display = 'block';
        }

        function closeAssignModal() {
            document.getElementById('assignModal').style.display = 'none';
        }

        async function submitAssign() {
            const assignedTo = document.getElementById('assignedTo').value;
            
            if (!assignedTo.trim()) {
                alert('Please enter a mechanic/technician name');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/assign/${currentServiceId}?assignedTo=${encodeURIComponent(assignedTo)}`, {
                    method: 'POST'
                });
                
                if (response.ok) {
                    alert('✓ Service assigned successfully!');
                    closeAssignModal();
                    loadData();
                } else {
                    alert('Error assigning service');
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        function openCompleteModal(serviceId) {
            currentServiceId = serviceId;
            document.getElementById('cost').value = '';
            document.getElementById('notes').value = '';
            document.getElementById('completeModal').style.display = 'block';
        }

        function closeCompleteModal() {
            document.getElementById('completeModal').style.display = 'none';
        }

        async function submitComplete() {
            const cost = document.getElementById('cost').value;
            const notes = document.getElementById('notes').value;

            if (!cost) {
                alert('Please enter the service cost');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/complete/${currentServiceId}?cost=${cost}&notes=${encodeURIComponent(notes)}`, {
                    method: 'POST'
                });
                
                if (response.ok) {
                    alert('✓ Service marked as completed!');
                    closeCompleteModal();
                    loadData();
                } else {
                    alert('Error completing service');
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        function viewDetails(serviceId) {
            const service = allServices.find(s => s.id === serviceId);
            if (service) {
                alert(`
Service Details:
ID: #${service.id}
Status: ${service.status}
Vehicle: ${service.vehicle} - ${service.vehicleModel} (${service.vehicleYear})
Service Type: ${service.type}
Customer: ${service.customerName}
Phone: ${service.customerPhone}
Email: ${service.customerEmail}
Mileage: ${service.mileage} km
Booked: ${new Date(service.createdDate).toLocaleDateString('en-IN')}
${service.assignedTo ? `Assigned To: ${service.assignedTo}` : ''}
${service.cost ? `Cost: ₹${service.cost}` : ''}
${service.notes ? `Notes: ${service.notes}` : ''}
                `);
            }
        }

        // Close modal on outside click
        window.onclick = function(event) {
            if (event.target == document.getElementById('assignModal')) {
                closeAssignModal();
            }
            if (event.target == document.getElementById('completeModal')) {
                closeCompleteModal();
            }
        }
    </script>
</body>
</html>
